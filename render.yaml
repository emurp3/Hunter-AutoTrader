services:
  - type: web
    name: hunter
    runtime: python
    rootDir: backend
    buildCommand: cd .. && chmod +x build.sh && ./build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/system/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"

      # Database — points to the persistent Render Disk
      - key: HUNTER_DB_PATH
        value: /data/hunter.db
      - key: HUNTER_REPORTS_PATH
        value: /data/reports

      # Execution — live trading via Alpaca
      - key: EXECUTION_MODE
        value: live
      - key: EXECUTION_PROVIDER
        value: alpaca
      - key: ALPACA_ENABLED
        value: "true"
      - key: ALPACA_BASE_URL
        value: https://api.alpaca.markets

      # Alpaca credentials — set values in Render dashboard, never commit
      # Legacy names (SANDBOX_*) are kept — config.py resolves them as live credentials
      - key: SANDBOX_API_KEY
        sync: false
      - key: SANDBOX_SECRET_KEY
        sync: false
      # Canonical names — set whichever your Alpaca account uses
      - key: LIVE_API_KEY
        sync: false
      - key: LIVE_SECRET_KEY
        sync: false

      # Auth / admin
      - key: HUNTER_JWT_SECRET
        sync: false
      - key: HUNTER_ADMIN_PASSWORD
        sync: false
      - key: HUNTER_WORKER_TOKEN
        sync: false

      # Opportunity intake
      - key: AUTOTRADER_SOURCE_TYPE
        value: file
      - key: AUTOTRADER_FILE_PATH
        value: /opt/render/project/src/backend/data/seed_opportunities.json

      # Congressional signal feed — Capitol Trades went offline May 2026
      # Primary: Politician Trade Tracker via RapidAPI
      - key: RAPIDAPI_POLITICIAN_KEY
        sync: false
      # Fallback: QuiverQuant
      - key: QUIVER_QUANT_API_KEY
        sync: false

      # Advisor AI keys — daily opportunity rotation (Venice Mon/Thu, Grok Tue/Fri/Sun, DeepSeek Wed/Sat)
      - key: VENICE_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GROK_API_KEY
        sync: false

      # Operating account (label only — no credentials stored here)
      - key: HUNTER_OPERATING_ACCOUNT_PROVIDER
        value: robins_financial
      - key: HUNTER_INITIAL_BANKROLL
        value: "163"

      # Facebook Marketplace lane (disabled until ready)
      - key: MARKETPLACE_FB_LANE_ENABLED
        value: "false"
      - key: MARKETPLACE_FB_PROVIDER
        value: manual
      - key: MARKETPLACE_FB_MESSAGE_SUPPORT_ENABLED
        value: "false"
      - key: MARKETPLACE_FB_RATE_LIMIT_PER_HOUR
        value: "5"

    disk:
      name: hunter-data
      mountPath: /data
      sizeGB: 1

  - type: worker
    name: hunter-hva-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: python -m app.worker.main
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: HUNTER_BASE_URL
        value: https://hunter.onrender.com
      - key: HUNTER_WORKER_ID
        value: hosted-hva-worker-1
      - key: HUNTER_WORKER_TOKEN
        sync: false
      - key: HUNTER_POLL_INTERVAL_SECONDS
        value: "10"
      - key: HUNTER_HEARTBEAT_INTERVAL_SECONDS
        value: "45"
      - key: HUNTER_PLAYWRIGHT_HEADLESS
        value: "true"
      - key: HUNTER_CLAUDE_MODEL
        value: claude-sonnet-4-5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MARKETPLACE_FB_EMAIL
        sync: false
      - key: MARKETPLACE_FB_PASSWORD
        sync: false
      - key: MARKETPLACE_FB_2FA_SECRET
        sync: false
      - key: MARKETPLACE_FB_SESSION_STATE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: HUNTER_SERVICE_LOCATION
        sync: false
